# docker-compose.yml
services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: sensorkita_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - sensorkita

  webserver:
    image: nginx:stable-alpine
    container_name: sensorkita_nginx
    restart: unless-stopped
    ports:
      - "8080:89"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - sensorkita

  db:
    image: mysql:8.0
    container_name: sensorkita_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sensorkita
      MYSQL_USER: sensorkita_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3307:3306"   # 3307 di host, supaya tidak bentrok dgn MySQL lokal Navicat/lainnya
    volumes:
      - sensorkita_dbdata:/var/lib/mysql
    networks:
      - sensorkita

  node:
    image: node:20-alpine
    container_name: sensorkita_node
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    networks:
      - sensorkita

networks:
  sensorkita:
    driver: bridge

volumes:
  sensorkita_dbdata:
    driver: local